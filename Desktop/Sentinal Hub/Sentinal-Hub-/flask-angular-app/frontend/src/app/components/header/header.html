<header class="fintech-header">
  <div class="header-container">
    <div class="header-brand">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
      </svg>
      <span class="brand-text">Ganesh<span class="brand-accent">Trades</span></span>
    </div>
    <nav class="header-nav" *ngIf="authService.currentUser$ | async as user">
      <!-- User links -->
      <a routerLink="/market-analysis" routerLinkActive="active" class="nav-link" *ngIf="user.role !== 'admin'">Market
        News</a>
      <a routerLink="/sentiment-feed" routerLinkActive="active" class="nav-link" *ngIf="user.role !== 'admin'">
        Data</a>
      <a routerLink="/ml-trading" routerLinkActive="active" class="nav-link" *ngIf="user.role !== 'admin'">Sentimental
        Analysis & Prediction
      </a>
      <a routerLink="/trade-history" routerLinkActive="active" class="nav-link" *ngIf="user.role !== 'admin'">Trade
        History</a>
      <!-- Admin links -->
      <a routerLink="/admin-kyc" routerLinkActive="active" class="nav-link" *ngIf="user.role === 'admin'">Review KYC</a>
    </nav>
    <div class="header-actions" *ngIf="authService.currentUser$ | async as user">
      <a routerLink="/settings" routerLinkActive="active" class="settings-link" *ngIf="user.role !== 'admin'">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"></circle>
          <path
            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
          </path>
        </svg>
      </a>
      <div class="user-pill">
        <span class="user-greeting">Hi, {{ user.username }}</span>
        <span class="admin-badge" *ngIf="user.role === 'admin'">Admin</span>
      </div>
      <button class="logout-btn" (click)="logout()">Logout</button>
    </div>
  </div>
</header>
