<div class="auth-container">
  <div class="auth-card" style="max-width: 600px;">
    <div class="auth-header">
      <h2>Profile Verification</h2>
      <p>Please enter your personal details to proceed</p>
    </div>

    <div class="error-banner" *ngIf="error">{{ error }}</div>

    <form [formGroup]="kycForm" (ngSubmit)="onSubmit()">
      <div style="display: flex; gap: 1rem;">
        <div class="form-group" style="flex: 1;">
          <label>First Name</label>
          <input type="text" formControlName="first_name" required>
        </div>
        <div class="form-group" style="flex: 1;">
          <label>Last Name</label>
          <input type="text" formControlName="last_name" required>
        </div>
      </div>
      
      <div class="form-group">
        <label>Phone Number</label>
        <input type="text" formControlName="phone" required>
      </div>

      <div class="form-group">
        <label>Address</label>
        <input type="text" formControlName="address" required>
      </div>

      <div style="display: flex; gap: 1rem;">
        <div class="form-group" style="flex: 1;">
          <label>Apt No (Optional)</label>
          <input type="text" formControlName="apt_no">
        </div>
        <div class="form-group" style="flex: 2;">
          <label>City</label>
          <input type="text" formControlName="city" required>
        </div>
      </div>

      <div style="display: flex; gap: 1rem;">
        <div class="form-group" style="flex: 1;">
          <label>State</label>
          <input type="text" formControlName="state" required>
        </div>
        <div class="form-group" style="flex: 1;">
          <label>Zip Code</label>
          <input type="text" formControlName="zipcode" required>
        </div>
        <div class="form-group" style="flex: 1;">
          <label>Country</label>
          <input type="text" formControlName="country" required>
        </div>
      </div>

      <button type="submit" class="submit-btn" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Submitting...' : 'Next Step' }}
      </button>
    </form>
  </div>
</div>
