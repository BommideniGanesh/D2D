<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h2>Create Account</h2>
      <p>Join the platform today</p>
    </div>

    <div class="error-banner" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <form (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" [(ngModel)]="username" required autocomplete="username">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" [(ngModel)]="password" required
          autocomplete="new-password">
      </div>

      <div class="form-group checkbox-group">
        <input type="checkbox" id="isAdmin" name="isAdmin" [(ngModel)]="isAdmin">
        <label for="isAdmin">Create as Admin</label>
      </div>

      <button type="submit" class="submit-btn" [disabled]="isLoading || !username || !password">
        <span *ngIf="!isLoading">Register</span>
        <span *ngIf="isLoading" class="spinner"></span>
      </button>

      <div class="auth-footer">
        <p>Already have an account? <a routerLink="/login">Log in</a></p>
      </div>
    </form>
  </div>
</div>
