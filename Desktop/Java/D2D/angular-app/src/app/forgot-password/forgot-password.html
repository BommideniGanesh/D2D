<div class="d-flex justify-content-center align-items-center" style="min-height: calc(100vh - 150px);">

    <!-- Toast Notification -->
    <div *ngIf="showToast" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1050;">
        <div class="toast show align-items-center text-white border-0" [class.bg-success]="toastType === 'success'"
            [class.bg-danger]="toastType === 'error'" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body">
                    {{ toastMessage }}
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" (click)="showToast = false"
                    aria-label="Close"></button>
            </div>
        </div>
    </div>

    <div class="row w-100 bg-white shadow-lg rounded overflow-hidden" style="max-width: 1000px;">

        <!-- Form Side (Left Side for Forgot Password) -->
        <div class="col-md-6 p-4 d-flex flex-column justify-content-center order-1">
            <div>
                <h2 class="fw-bold mb-4">Reset Password</h2>
                <p class="text-muted mb-4">Remembered your password? <a routerLink="/login"
                        class="text-info text-decoration-none">Back to Login</a></p>

                <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()">
                    <div class="mb-3">
                        <label class="form-label text-uppercase text-muted small fw-bold">Email ID</label>
                        <input type="email" class="form-control border-0 border-bottom rounded-0 ps-0"
                            placeholder="name@example.com" formControlName="email">
                        <div *ngIf="l['email'].touched && l['email'].errors" class="text-danger small mt-1">
                            <span *ngIf="l['email'].errors['required']">Email is required</span>
                            <span *ngIf="l['email'].errors['email']">Invalid email format</span>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-uppercase text-muted small fw-bold">New Password</label>
                        <div class="input-group border-bottom">
                            <input [type]="showLoginPassword ? 'text' : 'password'"
                                class="form-control border-0 rounded-0 ps-0 box-shadow-none"
                                placeholder="Enter New Password" formControlName="newPassword"
                                style="box-shadow: none;">
                            <button type="button" class="btn input-group-text bg-white border-0"
                                (click)="togglePasswordVisibility()" style="cursor: pointer;">
                                <i class="bi" [class.bi-eye]="!showLoginPassword"
                                    [class.bi-eye-slash]="showLoginPassword"></i>
                            </button>
                        </div>
                        <div *ngIf="l['newPassword'].touched && l['newPassword'].errors" class="text-danger small mt-1">
                            <span *ngIf="l['newPassword'].errors['required']">New Password is required</span>
                            <span *ngIf="l['newPassword'].errors['minlength']">Password must be at least 6
                                characters</span>
                        </div>
                    </div>

                    <div class="d-grid mt-4 mb-3">
                        <button class="btn btn-primary rounded-pill py-2 fw-bold text-uppercase shadow-sm"
                            [disabled]="forgotForm.invalid">Reset Password</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Image Side (Right Side for Forgot Password) -->
        <div class="col-md-6 p-0 relative d-none d-md-block order-2" style="background-color: #f8f9fa;">
            <div class="h-100 w-100 d-flex flex-column justify-content-center align-items-center p-4">
                <i class="bi bi-shield-lock text-primary" style="font-size: 8rem; opacity: 0.8;"></i>
                <h3 class="mt-4 text-secondary">Secure Password Reset</h3>
            </div>
        </div>
    </div>
</div>
